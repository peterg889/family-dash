; Elecrow CrowPanel ESP32 E-Paper 4.2" (SSD1683, 400x300 B/W)
; ESP32-S3-WROOM-1-N8R8 (8MB flash / 8MB OPI PSRAM), CH340 USB-UART.
[env:crowpanel_epaper42]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash: 8MB quad (QIO) ---
board_upload.flash_size = 8MB
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv

; --- PSRAM: 8MB octal (OPI) on the N8R8 module ---
; qio_opi = quad flash + octal PSRAM. NOT opi_opi, NOT qio_qspi.
board_build.arduino.memory_type = qio_opi

; --- CH340 USB-UART: 460800 is reliable; 921600 is flaky on this bridge ---
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; departures.cpp/schedule_data.h are the on-device schedule port — no longer
; used at runtime (the board is fetched from the API) but kept for the tests
; and as a possible offline fallback, so exclude them from the firmware build.
build_src_filter = +<*> -<departures.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    ; CH340 UART bootloader, NOT native USB-CDC. CDC_ON_BOOT=1 yields NO
    ; serial output on this board (and breaks the screenshot dump).
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    zinggjm/GxEPD2 @ ^1.6.4
    bblanchon/ArduinoJson @ ^7.4.1
